name: CI - Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker image and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupérer le code source ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Extraire le SHA court du commit ───────────────────────────────────
      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── 3. Se connecter à Docker Hub ─────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Configurer Docker Buildx (builder multi-platform) ─────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Builder et pusher l'image avec le SHA comme tag ───────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-entrepot-logist:${{ steps.vars.outputs.sha_short }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-entrepot-logist:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Résumé dans le log GitHub Actions ─────────────────────────────────
      - name: Summary
        run: |
          echo "### Image Docker publiée avec succès !" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image** : \`${{ secrets.DOCKERHUB_USERNAME }}/gestion-entrepot-logist\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag SHA** : \`${{ steps.vars.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag latest** : \`latest\`" >> $GITHUB_STEP_SUMMARY
